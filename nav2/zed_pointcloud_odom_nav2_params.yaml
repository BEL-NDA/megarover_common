    - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.08
      movement_time_allowance: 20.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 3.14

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.10
      min_vel_y: 0.0
      max_vel_x: 0.50
      max_vel_y: 0.0
      max_vel_theta: 0.675
      min_speed_xy: 0.10
      max_speed_xy: 0.50
      min_speed_theta: 0.10
      max_speed_theta: 0.675
      acc_lim_x: 0.4
      acc_lim_y: 0.0
      acc_lim_theta: 1.2
      decel_lim_x: -0.5
      decel_lim_y: 0.0
      decel_lim_theta: -1.2
      vx_samples: 12
      vy_samples: 1
      vtheta_samples: 16
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.3
      xy_goal_tolerance: 0.40
      trans_stopped_velocity: 0.03
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.15
      PathAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.25
      GoalAlign.scale: 18.0
      GoalAlign.forward_point_distance: 0.25
      PathDist.scale: 24.0
      GoalDist.scale: 18.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 8.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[ [0.13, 0.18], [0.13, -0.18], [-0.30, -0.18], [-0.30, 0.18] ]"
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.15
        z_voxels: 16
        mark_threshold: 2
        max_obstacle_height: 1.8
        observation_sources: zed_cloud clear_cloud
        observation_persistence: 0.0
        combination_method: 1
        zed_cloud:
          topic: /perception/nav2_obstacle_cloud
          data_type: "PointCloud2"
          clearing: true
          marking: true
          min_obstacle_height: 0.15
          max_obstacle_height: 1.8
          obstacle_min_range: 0.20
          obstacle_max_range: 3.5
          raytrace_min_range: 0.20
          raytrace_max_range: 4.0
        clear_cloud:
          topic: /perception/nav2_clear_cloud
          data_type: "PointCloud2"
          clearing: true
          marking: false
          min_obstacle_height: 0.15
          max_obstacle_height: 1.8
          obstacle_min_range: 0.20
          obstacle_max_range: 4.0
          raytrace_min_range: 0.20
          raytrace_max_range: 4.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.45
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 3.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 24
      height: 24
      resolution: 0.05
      track_unknown_space: false
      footprint: "[ [0.13, 0.18], [0.13, -0.18], [-0.30, -0.18], [-0.30, 0.18] ]"
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.50
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.3
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.675
    min_rotational_vel: 0.1
    rotational_acc_lim: 0.8

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.50, 0.0, 0.675]
    min_velocity: [0.0, 0.0, -0.675]
    max_accel: [0.4, 0.0, 1.2]
    max_decel: [-0.5, 0.0, -1.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
